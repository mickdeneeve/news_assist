<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Briefing Configuration</title>
    <style>
      :root {
        --bg-top: #f7efe2;
        --bg-bottom: #d6ebe4;
        --panel: rgba(255, 252, 247, 0.9);
        --text: #182126;
        --accent: #0d6b66;
        --accent-strong: #0b4f4b;
        --muted: #5e6b73;
        --shadow: rgba(24, 33, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 35%),
          linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      }

      main {
        width: min(94vw, 900px);
        padding: 3rem;
        border: 1px solid rgba(24, 33, 38, 0.08);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 22px 44px -28px var(--shadow);
        backdrop-filter: blur(14px);
      }

      .nav {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .nav a {
        padding: 0.5rem 0.9rem;
        border-radius: 999px;
        color: var(--accent-strong);
        text-decoration: none;
        background: rgba(13, 107, 102, 0.1);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .nav a.active {
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: white;
      }

      h1 {
        margin: 0;
        font-size: clamp(2.6rem, 10vw, 4.4rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
      }

      p {
        margin: 1rem 0 0;
        font-size: 1.05rem;
        color: var(--muted);
      }

      form {
        margin-top: 2rem;
        display: grid;
        gap: 1.4rem;
      }

      .field {
        padding: 1.25rem;
        border: 1px solid rgba(24, 33, 38, 0.09);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.62);
      }

      label {
        display: block;
        margin: 0 0 0.5rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      select,
      input {
        width: 100%;
        padding: 0.9rem 1rem;
        border: 1px solid rgba(24, 33, 38, 0.16);
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.78);
        color: var(--text);
        font: inherit;
      }

      .hint {
        margin-top: 0.7rem;
        font-size: 0.94rem;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 0.8rem;
        margin-top: 1rem;
      }

      .icon-button {
        width: 2.4rem;
        height: 2.4rem;
        padding: 0;
        border: 0;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: white;
        font-size: 1.4rem;
        font-weight: 700;
        cursor: pointer;
      }

      .question-list {
        display: grid;
        gap: 0.85rem;
      }

      .question-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.8rem;
        align-items: center;
      }

      .remove-button {
        border: 0;
        border-radius: 999px;
        padding: 0.75rem 1rem;
        background: rgba(24, 33, 38, 0.08);
        color: var(--text);
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 1rem;
      }

      .save-button {
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.4rem;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      #status {
        margin: 0;
        font-size: 0.95rem;
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="nav" aria-label="Primary">
        <a href="/">Briefing</a>
        <a class="active" href="/config">Configuration</a>
      </nav>

      <h1>Briefing Configuration</h1>
      <p>Choose the OpenAI model and define the reporting questions the newsroom brief should answer for any topic or event.</p>

      <form id="config-form">
        <section class="field">
          <label for="openai-model">OpenAI Model</label>
          <select id="openai-model" name="openai_model" required></select>
          <p class="hint" id="model-hint">Loading the current model list...</p>
        </section>

        <section class="field">
          <label>Reporting Questions</label>
          <div id="questions-list" class="question-list"></div>

          <div class="toolbar">
            <button id="add-question" class="icon-button" type="button" aria-label="Add question">+</button>
            <span>Add another reporting question</span>
          </div>
        </section>

        <div class="actions">
          <button id="save-button" class="save-button" type="submit">Save Configuration</button>
          <p id="status">Loading current configuration...</p>
        </div>
      </form>
    </main>

    <script>
      const form = document.getElementById("config-form");
      const modelSelect = document.getElementById("openai-model");
      const modelHint = document.getElementById("model-hint");
      const questionsList = document.getElementById("questions-list");
      const addQuestionButton = document.getElementById("add-question");
      const saveButton = document.getElementById("save-button");
      const status = document.getElementById("status");

      function addQuestionRow(value = "") {
        const row = document.createElement("div");
        row.className = "question-row";

        const input = document.createElement("input");
        input.type = "text";
        input.placeholder = "Enter a reporting question";
        input.value = value;
        input.required = true;

        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "remove-button";
        removeButton.textContent = "Remove";
        removeButton.addEventListener("click", () => {
          row.remove();

          if (!questionsList.children.length) {
            addQuestionRow();
          }
        });

        row.append(input, removeButton);
        questionsList.appendChild(row);
      }

      function renderQuestions(questions) {
        questionsList.replaceChildren();

        for (const question of questions) {
          addQuestionRow(question);
        }

        if (!questionsList.children.length) {
          addQuestionRow();
        }
      }

      function renderModelOptions(currentModel, availableModels) {
        modelSelect.replaceChildren();

        for (const model of availableModels) {
          const option = document.createElement("option");
          option.value = model;
          option.textContent = model;

          if (model === currentModel) {
            option.selected = true;
          }

          modelSelect.appendChild(option);
        }
      }

      function collectQuestions() {
        return Array.from(questionsList.querySelectorAll("input"))
          .map((input) => input.value.trim())
          .filter(Boolean);
      }

      async function loadConfig() {
        status.textContent = "Loading current configuration...";

        try {
          const response = await fetch("/api/config");
          const payload = await response.json();

          if (!response.ok) {
            throw new Error(payload.error || `HTTP ${response.status}`);
          }

          renderModelOptions(payload.openai_model, payload.available_models);
          renderQuestions(payload.questions);

          modelHint.textContent = payload.models_error
            ? `Live model list unavailable: ${payload.models_error}`
            : `${payload.available_models.length} model(s) available from OpenAI.`;

          status.textContent = "Current configuration loaded.";
        } catch (error) {
          status.textContent = error.message;
        }
      }

      async function saveConfig(event) {
        event.preventDefault();

        const questions = collectQuestions();
        if (!questions.length) {
          status.textContent = "Add at least one reporting question.";
          return;
        }

        saveButton.disabled = true;
        status.textContent = "Saving configuration...";

        try {
          const response = await fetch("/api/config", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              openai_model: modelSelect.value,
              questions,
            }),
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || `HTTP ${response.status}`);
          }

          renderModelOptions(payload.openai_model, payload.available_models);
          renderQuestions(payload.questions);

          modelHint.textContent = payload.models_error
            ? `Live model list unavailable: ${payload.models_error}`
            : `${payload.available_models.length} model(s) available from OpenAI.`;

          status.textContent = payload.message;
        } catch (error) {
          status.textContent = error.message;
        } finally {
          saveButton.disabled = false;
        }
      }

      addQuestionButton.addEventListener("click", () => addQuestionRow());
      form.addEventListener("submit", saveConfig);
      loadConfig();
    </script>
  </body>
</html>
