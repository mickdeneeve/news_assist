<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hello World</title>
    <style>
      :root {
        --bg-top: #f7efe2;
        --bg-bottom: #d6ebe4;
        --panel: rgba(255, 252, 247, 0.86);
        --text: #182126;
        --accent: #0d6b66;
        --muted: #5e6b73;
        --shadow: rgba(24, 33, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 35%),
          linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 680px);
        padding: 3rem;
        border: 1px solid rgba(24, 33, 38, 0.08);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 22px 44px -28px var(--shadow);
        backdrop-filter: blur(14px);
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 5rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
      }

      p {
        margin: 1rem 0 0;
        font-size: 1.05rem;
        color: var(--muted);
      }

      .backend {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(24, 33, 38, 0.1);
      }

      .label {
        margin: 0 0 0.5rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      #backend-message {
        margin: 0;
        font-size: 1.1rem;
        color: var(--text);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Hello World</h1>
      <p>A minimal web page served by a Python backend.</p>

      <section class="backend" aria-live="polite">
        <p class="label">Backend Response</p>
        <p id="backend-message">Loading...</p>
      </section>
    </main>

    <script>
      async function loadBackendMessage() {
        const target = document.getElementById("backend-message");

        try {
          const response = await fetch("/api/hello");
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          target.textContent = payload.message;
        } catch (error) {
          target.textContent = `Backend request failed: ${error.message}`;
        }
      }

      loadBackendMessage();
    </script>
  </body>
</html>
