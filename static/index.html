<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GPT-5.4 Demo</title>
    <style>
      :root {
        --bg-top: #f7efe2;
        --bg-bottom: #d6ebe4;
        --panel: rgba(255, 252, 247, 0.86);
        --text: #182126;
        --accent: #0d6b66;
        --muted: #5e6b73;
        --accent-strong: #0b4f4b;
        --shadow: rgba(24, 33, 38, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.7), transparent 35%),
          linear-gradient(160deg, var(--bg-top), var(--bg-bottom));
        color: var(--text);
        font-family: "Trebuchet MS", "Gill Sans", "Segoe UI", sans-serif;
      }

      main {
        width: min(92vw, 680px);
        padding: 3rem;
        border: 1px solid rgba(24, 33, 38, 0.08);
        border-radius: 28px;
        background: var(--panel);
        box-shadow: 0 22px 44px -28px var(--shadow);
        backdrop-filter: blur(14px);
      }

      .nav {
        display: flex;
        gap: 0.75rem;
        margin-bottom: 1.5rem;
      }

      .nav a {
        padding: 0.5rem 0.9rem;
        border-radius: 999px;
        color: var(--accent-strong);
        text-decoration: none;
        background: rgba(13, 107, 102, 0.1);
        font-size: 0.92rem;
        font-weight: 700;
      }

      .nav a.active {
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: white;
      }

      h1 {
        margin: 0;
        font-size: clamp(3rem, 12vw, 5rem);
        line-height: 0.95;
        letter-spacing: -0.08em;
      }

      p {
        margin: 1rem 0 0;
        font-size: 1.05rem;
        color: var(--muted);
      }

      form {
        margin-top: 2rem;
      }

      label,
      .label {
        display: block;
        margin: 0 0 0.5rem;
        font-size: 0.8rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: var(--accent);
      }

      textarea {
        width: 100%;
        min-height: 140px;
        padding: 1rem 1.1rem;
        border: 1px solid rgba(24, 33, 38, 0.16);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--text);
        font: inherit;
        resize: vertical;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin-top: 1rem;
      }

      button {
        border: 0;
        border-radius: 999px;
        padding: 0.85rem 1.4rem;
        background: linear-gradient(180deg, var(--accent), var(--accent-strong));
        color: white;
        font: inherit;
        font-weight: 700;
        cursor: pointer;
      }

      button:disabled {
        cursor: wait;
        opacity: 0.7;
      }

      #status {
        margin: 0;
        font-size: 0.95rem;
      }

      .response {
        margin-top: 2rem;
        padding-top: 1.5rem;
        border-top: 1px solid rgba(24, 33, 38, 0.1);
      }

      #response-text {
        margin: 0;
        font-size: 1.1rem;
        color: var(--text);
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <main>
      <nav class="nav" aria-label="Primary">
        <a class="active" href="/">Chat</a>
        <a href="/config">Configuration</a>
      </nav>

      <h1>Ask GPT-5.4</h1>
      <p>Type a prompt, send it to the Python backend, and show the model response here.</p>

      <form id="chat-form">
        <label for="query">Your Query</label>
        <textarea id="query" name="query" placeholder="Write your prompt here..." required></textarea>

        <div class="actions">
          <button type="submit" id="send-button">Send</button>
          <p id="status">Ready.</p>
        </div>
      </form>

      <section class="response" aria-live="polite">
        <p class="label">Response</p>
        <p id="response-text">The model reply will appear here.</p>
      </section>
    </main>

    <script>
      const form = document.getElementById("chat-form");
      const queryInput = document.getElementById("query");
      const sendButton = document.getElementById("send-button");
      const status = document.getElementById("status");
      const responseText = document.getElementById("response-text");

      async function submitQuery(event) {
        event.preventDefault();

        const query = queryInput.value.trim();
        if (!query) {
          status.textContent = "Enter a prompt first.";
          return;
        }

        sendButton.disabled = true;
        status.textContent = "Sending...";
        responseText.textContent = "Waiting for the model response...";

        try {
          const response = await fetch("/api/chat", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({ query }),
          });

          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error || `HTTP ${response.status}`);
          }

          responseText.textContent = payload.response;
          status.textContent = `Response received from ${payload.model}.`;
        } catch (error) {
          responseText.textContent = "The request failed.";
          status.textContent = error.message;
        } finally {
          sendButton.disabled = false;
        }
      }

      form.addEventListener("submit", submitQuery);
    </script>
  </body>
</html>
